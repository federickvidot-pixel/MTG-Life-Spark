<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="MGT Life Spark — Commander 2.0 multiplayer battlefield companion.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MGT Life Spark">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MGT Life Spark</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #12121a;
      color: #ffffff;
      font-family: system-ui, -apple-system, sans-serif;
    }
    #app-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
    }
    #app-loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255, 255, 255, 0.15);
      border-top-color: #9b6dff;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #app-loading p {
      margin: 0;
      font-size: 14px;
      opacity: 0.75;
      text-align: center;
      max-width: 280px;
      line-height: 1.4;
    }
    #app-loading .hint {
      margin-top: 12px;
      font-size: 12px;
      opacity: 0.55;
    }
  </style>
</head>
<body>
  <div id="app-loading" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <p id="app-loading-text">Loading MGT Life Spark…</p>
    <p id="app-loading-hint" class="hint" hidden></p>
  </div>
  <script src="flutter_bootstrap.js" async onerror="window.__flutterLoadFailed && window.__flutterLoadFailed()"></script>
  <script>
    (function () {
      var hint = document.getElementById('app-loading-hint');
      var text = document.getElementById('app-loading-text');
      window.__flutterLoadFailed = function () {
        if (text) text.textContent = 'Could not load the app.';
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Use the Mac dev server in release mode (flutter run -d web-server --release).';
        }
      };
      window.addEventListener('flutter-first-frame', function () {
        var el = document.getElementById('app-loading');
        if (el) el.remove();
      });
      setTimeout(function () {
        if (!document.getElementById('app-loading')) return;
        if (hint) {
          hint.hidden = false;
          hint.textContent =
            'Still loading… First open on phone can take 30–60s in release mode. Avoid debug builds on mobile.';
        }
      }, 20000);
    })();
  </script>
</body>
</html>
