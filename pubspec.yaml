name: mgt_life_spark
description: MGT Life Spark — Commander 2.0 multiplayer battlefield companion.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Bluetooth (kept for reference; connection now uses QR + WebSocket)
  flutter_reactive_ble: ^5.3.1

  # QR code display
  qr_flutter: ^4.1.0

  # QR code camera scanner
  mobile_scanner: ^6.0.0

  # WebSocket client
  web_socket_channel: ^3.0.1

  # Permissions
  permission_handler: ^11.3.1

  # Commander card images (Scryfall)
  cached_network_image: ^3.4.1
  http: ^1.2.2
  flutter_svg: ^2.0.16

  # Animations
  lottie: ^3.1.3

  # Sound & haptics
  audioplayers: ^6.1.0
  haptic_feedback: ^0.5.1+1

  # Screen wake lock
  wakelock_plus: ^1.2.9

  # Background BLE (Android foreground service)
  flutter_foreground_task: ^8.14.0

  # Utilities
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code generation for Hive adapters
  hive_generator: ^2.0.1
  build_runner: ^2.4.13

  # App icon generation (run: flutter pub run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/placeholders/
    - assets/sounds/

# ── App icon config (flutter_launcher_icons) ──────────────────────────────
# Place a 1024x1024 PNG at assets/images/app_icon.png, then run:
#   flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"
